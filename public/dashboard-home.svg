<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" role="img" aria-label="Rep dashboard home screen showing weekly stats and recent pages">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b1220" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="800" height="560" fill="url(#bg)"/>
  <!-- Browser chrome -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="720" height="500" rx="14" fill="#ffffff"/>
    <rect x="40" y="30" width="720" height="44" rx="14" fill="#f1f3f5"/>
    <rect x="40" y="60" width="720" height="14" fill="#f1f3f5"/>
    <circle cx="64" cy="52" r="6" fill="#ff5f56"/>
    <circle cx="84" cy="52" r="6" fill="#ffbd2e"/>
    <circle cx="104" cy="52" r="6" fill="#27c93f"/>
    <rect x="180" y="42" width="440" height="20" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
    <text x="400" y="57" font-family="Inter,Arial,sans-serif" font-size="12" fill="#5a6472" text-anchor="middle">videodoorknock.com/rep</text>
  </g>
  <!-- Header -->
  <g font-family="Inter,Arial,sans-serif">
    <text x="72" y="112" font-size="14" fill="#6b7280">1st Choice Painting</text>
    <text x="72" y="142" font-size="24" font-weight="700" fill="#111827">Your Dashboard</text>
    <rect x="600" y="118" width="128" height="36" rx="18" fill="#2f6bff"/>
    <text x="664" y="141" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">+ New Door Knock</text>
  </g>
  <!-- Nav tabs -->
  <g font-family="Inter,Arial,sans-serif" font-size="12" fill="#374151">
    <rect x="72" y="170" width="88" height="28" rx="14" fill="#eef2ff"/>
    <text x="116" y="189" text-anchor="middle" fill="#2f6bff" font-weight="600">Dashboard</text>
    <text x="186" y="189">Leads</text>
    <text x="240" y="189">Campaigns</text>
    <text x="316" y="189">Jobs</text>
  </g>
  <!-- Stats row -->
  <g font-family="Inter,Arial,sans-serif">
    <g>
      <rect x="72" y="212" width="208" height="96" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="88" y="236" font-size="11" fill="#6b7280" font-weight="600">PAGES CREATED</text>
      <text x="88" y="278" font-size="34" font-weight="800" fill="#111827">12</text>
      <text x="138" y="278" font-size="12" fill="#16a34a" font-weight="600">▲ 3 this week</text>
    </g>
    <g>
      <rect x="296" y="212" width="208" height="96" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="312" y="236" font-size="11" fill="#6b7280" font-weight="600">SCANS</text>
      <text x="312" y="278" font-size="34" font-weight="800" fill="#111827">87</text>
      <text x="356" y="278" font-size="12" fill="#16a34a" font-weight="600">▲ 21 this week</text>
    </g>
    <g>
      <rect x="520" y="212" width="208" height="96" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="536" y="236" font-size="11" fill="#6b7280" font-weight="600">LEADS</text>
      <text x="536" y="278" font-size="34" font-weight="800" fill="#2f6bff">9</text>
      <text x="568" y="278" font-size="12" fill="#16a34a" font-weight="600">▲ 4 this week</text>
    </g>
  </g>
  <!-- Recent pages -->
  <g font-family="Inter,Arial,sans-serif">
    <text x="72" y="344" font-size="14" font-weight="700" fill="#111827">Recent Pages</text>
    <g>
      <rect x="72" y="356" width="656" height="52" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
      <rect x="84" y="368" width="28" height="28" rx="6" fill="#e0e7ff"/>
      <text x="98" y="387" font-size="14" text-anchor="middle" fill="#2f6bff">▶</text>
      <text x="124" y="378" font-size="13" font-weight="600" fill="#111827">880 E Stormy Dr</text>
      <text x="124" y="396" font-size="11" fill="#6b7280">Created today · 14 scans · 2 leads</text>
      <rect x="620" y="370" width="84" height="22" rx="11" fill="#ecfdf5"/>
      <text x="662" y="385" font-size="11" text-anchor="middle" fill="#047857" font-weight="600">ACTIVE</text>
    </g>
    <g>
      <rect x="72" y="416" width="656" height="52" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
      <rect x="84" y="428" width="28" height="28" rx="6" fill="#e0e7ff"/>
      <text x="98" y="447" font-size="14" text-anchor="middle" fill="#2f6bff">▶</text>
      <text x="124" y="438" font-size="13" font-weight="600" fill="#111827">412 N Maple Ave</text>
      <text x="124" y="456" font-size="11" fill="#6b7280">Created 2d ago · 31 scans · 4 leads</text>
      <rect x="620" y="430" width="84" height="22" rx="11" fill="#ecfdf5"/>
      <text x="662" y="445" font-size="11" text-anchor="middle" fill="#047857" font-weight="600">ACTIVE</text>
    </g>
    <g>
      <rect x="72" y="476" width="656" height="40" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
      <rect x="84" y="484" width="22" height="22" rx="5" fill="#e0e7ff"/>
      <text x="95" y="500" font-size="11" text-anchor="middle" fill="#2f6bff">▶</text>
      <text x="120" y="500" font-size="12" font-weight="600" fill="#111827">27 Sandalwood Ln</text>
      <text x="260" y="500" font-size="11" fill="#6b7280">· 42 scans · 3 leads</text>
    </g>
  </g>
</svg>
