<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" role="img" aria-label="Create new door knock screen with video recording and QR code preview">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20252d"/>
      <stop offset="1" stop-color="#0b0f16"/>
    </linearGradient>
    <filter id="s2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b1220" flood-opacity=".08"/>
    </filter>
    <pattern id="qr" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#fff"/>
      <rect width="6" height="6" fill="#111"/>
      <rect x="6" y="6" width="6" height="6" fill="#111"/>
    </pattern>
  </defs>
  <rect width="800" height="560" fill="url(#bg2)"/>
  <g filter="url(#s2)">
    <rect x="40" y="30" width="720" height="500" rx="14" fill="#ffffff"/>
    <rect x="40" y="30" width="720" height="44" rx="14" fill="#f1f3f5"/>
    <rect x="40" y="60" width="720" height="14" fill="#f1f3f5"/>
    <circle cx="64" cy="52" r="6" fill="#ff5f56"/>
    <circle cx="84" cy="52" r="6" fill="#ffbd2e"/>
    <circle cx="104" cy="52" r="6" fill="#27c93f"/>
    <rect x="180" y="42" width="440" height="20" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
    <text x="400" y="57" font-family="Inter,Arial,sans-serif" font-size="12" fill="#5a6472" text-anchor="middle">videodoorknock.com/rep/new</text>
  </g>
  <g font-family="Inter,Arial,sans-serif">
    <text x="72" y="112" font-size="14" fill="#6b7280">New Door Knock</text>
    <text x="72" y="142" font-size="22" font-weight="700" fill="#111827">Record Your 30-Second Pitch</text>
    <text x="72" y="168" font-size="13" fill="#6b7280">Hit record, say hi, mention the neighborhood. That's it.</text>
  </g>
  <!-- Phone recording mockup -->
  <g transform="translate(90,190)">
    <rect x="0" y="0" width="210" height="320" rx="28" fill="url(#phone)"/>
    <rect x="10" y="10" width="190" height="300" rx="20" fill="#111827"/>
    <!-- video frame -->
    <rect x="14" y="14" width="182" height="292" rx="18" fill="#394150"/>
    <circle cx="105" cy="160" r="36" fill="#ef4444"/>
    <circle cx="105" cy="160" r="22" fill="#fff"/>
    <text x="105" y="230" font-family="Inter,Arial,sans-serif" font-size="10" fill="#fff" text-anchor="middle">REC · 00:12</text>
    <rect x="30" y="268" width="150" height="28" rx="14" fill="#ef4444"/>
    <text x="105" y="287" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Stop Recording</text>
  </g>
  <!-- Right side form -->
  <g font-family="Inter,Arial,sans-serif">
    <text x="340" y="210" font-size="12" font-weight="600" fill="#6b7280">HOUSE ADDRESS</text>
    <rect x="340" y="220" width="388" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
    <text x="354" y="244" font-size="13" fill="#111827">880 E Stormy Dr</text>

    <text x="340" y="280" font-size="12" font-weight="600" fill="#6b7280">NEIGHBORHOOD TAG</text>
    <rect x="340" y="290" width="388" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
    <text x="354" y="314" font-size="13" fill="#111827">Eagle — Stormy Estates</text>

    <text x="340" y="350" font-size="12" font-weight="600" fill="#6b7280">QR PREVIEW</text>
    <rect x="340" y="360" width="110" height="110" rx="10" fill="#fff" stroke="#d1d5db"/>
    <rect x="350" y="370" width="90" height="90" fill="url(#qr)"/>
    <text x="462" y="388" font-size="12" fill="#6b7280">Auto-generates after save.</text>
    <text x="462" y="406" font-size="12" fill="#6b7280">Print on a sticker or leave-behind.</text>

    <rect x="462" y="432" width="266" height="42" rx="10" fill="#2f6bff"/>
    <text x="595" y="459" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Save &amp; Print QR Sticker →</text>
  </g>
</svg>
